name: Build WechatBypass

on:
  push:
    branches: [wechat-bypass]
    paths:
      - 'wechat_bypass/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: wechat-bypass

      - name: Check cache
        run: |
          echo "upstream_heads=$(git ls-remote https://github.com/theos/theos | head -n 1 | cut -f 1)-$(git ls-remote https://github.com/theos/sdks | head -n 1 | cut -f 1)" >> $GITHUB_ENV

      - name: Use cache
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-${{ env.upstream_heads }}

      - name: Prepare Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: 'theos'
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Build rootful package
        run: |
          rm -f packages/*
          make package FINALPACKAGE=1

      - name: Upload rootful package
        uses: actions/upload-artifact@v4
        with:
          name: "WechatBypass-rootful"
          path: ${{ github.workspace }}/packages/*.deb

      - name: Build rootless package
        run: |
          rm -f packages/*
          make clean package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

      - name: Upload rootless package
        uses: actions/upload-artifact@v4
        with:
          name: "WechatBypass-rootless"
          path: ${{ github.workspace }}/packages/*.deb
